name: Build Blog

on:
  # Déclenché quand un .md est poussé dans blog/sources/ (hors drafts)
  push:
    branches: [main]
    paths:
      - 'blog/sources/*.md'
  # Déclenché manuellement ou par api/approve.js via workflow_dispatch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build blog (generate HTML from markdown sources)
        # generate-blog.js utilise la syntaxe CommonJS (require).
        # On crée un alias .cjs pour le rendre compatible avec "type":"module".
        run: cp scripts/generate-blog.js scripts/generate-blog.cjs && node scripts/generate-blog.cjs

      - name: Commit generated files
        run: |
          git config user.name "msd-seo-bot"
          git config user.email "seo@msd-media.com"
          git add blog/articles/ blog/index.html blog/feed.xml blog/sitemap.xml sitemap.xml blog/articles-manifest.json
          git diff --cached --quiet || git commit -m "chore(blog): rebuild articles [skip ci]"
          git push
