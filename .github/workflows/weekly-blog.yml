name: Weekly SEO Blog Generator

on:
  schedule:
    # Chaque lundi à 07:00 UTC = 08:00 heure Paris (hiver) / 09:00 (été)
    - cron: '0 7 * * 1'
  workflow_dispatch: # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate articles and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
          APPROVAL_BASE_URL: ${{ secrets.APPROVAL_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: node scripts/generate-articles.js
